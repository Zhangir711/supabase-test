<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статуса группы</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 24px; }
        h2 { margin: 0 0 10px 0; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .status-btn { 
            border: none; border-radius: 8px; color: white; font-weight: 600; 
            cursor: pointer; height: 48px; display: flex; align-items: center; justify-content: center;
        }
        .green { background: #34a853; }
        .yellow { background: #fbbc05; color: black; }
        .teal { background: #1098ad; }
        .gray { background: #70757a; }
        
        #group-list { list-style: none; padding: 0; margin: 0; }
        .user-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; }
        .username { font-weight: bold; }
        .user-status { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Мой профиль</h2>
            <p id="myInfo">Загрузка профиля...</p>
            <div class="button-group">
                <button class="status-btn green" onclick="changeStatus('Учусь', '#34a853')">📖 Учусь</button>
                <button class="status-btn yellow" onclick="changeStatus('Кофе-брейк', '#fbbc05')">☕ Кофе-брейк</button>
                <button class="status-btn teal" onclick="changeStatus('В игре', '#1098ad')">🎮 В игре</button>
                <button class="status-btn gray" onclick="changeStatus('Дома', '#70757a')">🏠 Дома</button>
            </div>
        </div>

        <div class="card">
            <h2>Монитор группы</h2>
            <div id="group-list">Загрузка списка группы...</div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://bopfzedgzxirjvwimfga.supabase.co';
        const KEY = 'sb_publishable_nsYy6DM2k69pZBscDr_3Iw_g5o3e0zQ';
        const supabase = createClient(URL, KEY);

        // ОБЯЗАТЕЛЬНО: Проверь этот ID, он должен быть из твоей колонки 'id' в Supabase
        const MY_ID = '247d960d-52f1-4742-9d8d-89a78058943a'; 

        // Делаем функцию ГЛОБАЛЬНОЙ через window, чтобы работал onclick в HTML
        window.changeStatus = async (text, color) => {
            console.log("Обновление статуса на:", text);
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                console.error("Ошибка обновления:", error);
                alert("Ошибка! Проверьте RLS политики.");
            } else {
                fetchGroup(); // Сразу обновляем список после нажатия
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error("Ошибка загрузки:", error);
                return;
            }

            // Рендерим список группы
            const listContainer = document.getElementById('group-list');
            listContainer.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div>
                        <div class="username">${user.username}</div>
                        <div class="user-status">${user.status || 'Нет статуса'}</div>
                    </div>
                </div>
            `).join('');

            // Обновляем инфо о себе
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myInfo').innerHTML = `Вы зашли как: <b>${me.username}</b>`;
            } else {
                document.getElementById('myInfo').innerHTML = `<span style="color:red">Пользователь с вашим ID не найден в базе</span>`;
            }
        }

        // Запуск при загрузке
        fetchGroup();
        // Обновление каждые 5 секунд
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
